<!DOCTYPE html><html lang="pt-BR" style=""><head>
<meta charset="utf-8">

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        .active-tab {
            background-color: #1a1c1c;
            border-radius: 12px;
        }
        body {
            background-color: #000000;
            color: #FCFCFC;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex flex-col min-h-screen bg-black">
<!-- Top Bar -->
<header class="flex items-center justify-between px-lg pt-xl pb-md">
<div class="flex items-center gap-sm cursor-pointer group">
<h1 class="text-title-lg font-bold">Meu Plano</h1>
<span class="material-symbols-outlined text-primary group-hover:translate-y-1 transition-transform">expand_more</span>
</div>
<div class="flex items-center gap-md">
<button class="relative p-sm rounded-full hover:bg-surface transition-colors">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full"></span>
</button>
<button class="p-sm rounded-full hover:bg-surface transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Navigation Tabs -->
<nav class="px-md mb-lg">
<div class="flex items-center justify-between bg-surface-container-low p-1 rounded-2xl">
<a class="flex-1 py-3 text-center text-label-md font-bold text-on-surface-variant hover:text-on-surface transition-colors" href="#">DIA 1</a>
<a class="flex-1 py-3 text-center text-label-md font-bold text-on-surface active-tab rounded-xl" href="#">DIA 2</a>
<a class="flex-1 py-3 text-center text-label-md font-bold text-on-surface-variant hover:text-on-surface transition-colors" href="#">DIA 3</a>
<a class="flex-1 py-3 text-center text-label-md font-bold text-on-surface-variant hover:text-on-surface transition-colors" href="#">DIA 4</a>
<a class="flex-1 py-3 text-center text-label-md font-bold text-on-surface-variant hover:text-on-surface transition-colors" href="#">DIA 5</a>
</div>
</nav>
<!-- Main Content -->
<main class="flex-1 px-md space-y-xl overflow-y-auto">
<!-- Workout Config Section -->
<section>
<h2 class="text-label-sm font-bold tracking-widest text-on-surface-variant mb-md px-1">CONFIGURAÇÕES DE TREINO</h2>
<div class="flex flex-nowrap gap-sm overflow-x-auto pb-1">
<div class="flex items-center gap-2 px-md py-sm bg-surface rounded-2xl flex-shrink-0">
<span class="material-symbols-outlined text-sm">home_work</span>
<span class="text-body-md font-medium">Minha Academia</span>
</div>
<div class="flex items-center gap-2 px-md py-sm bg-surface rounded-2xl flex-shrink-0">
<span class="material-symbols-outlined text-sm">schedule</span>
<span class="text-body-md font-medium">60min</span>
</div>
<div class="flex items-center gap-2 px-md py-sm bg-surface rounded-2xl flex-shrink-0">
<span class="material-symbols-outlined text-sm">exercise</span>
<span class="text-body-md font-medium">Músculos (0)</span>
</div>
</div>
</section>
<!-- Exercises Section -->
<section>
<h2 class="text-label-sm font-bold tracking-widest text-on-surface-variant mb-md px-1 uppercase">Os Exercícios</h2>
<div class="space-y-md">
<!-- Empty State / Add Exercise Card -->
<button class="w-full flex items-center gap-md p-md border-2 border-dashed border-outline-variant rounded-2xl hover:bg-surface-container hover:border-[#CCFF00] transition-all group">
<div class="size-12 flex items-center justify-center bg-surface-variant rounded-full group-hover:bg-[#CCFF00]/20 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-[#CCFF00]">add</span>
</div>
<div class="text-left">
<p class="text-body-lg font-bold">ADICIONAR EXERCÍCIO</p>
<p class="text-body-sm text-on-surface-variant">Comece a montar seu treino do Dia 2</p>
</div>
</button><button class="w-full py-sm text-primary font-bold text-labelLarge text-center transition-colors hover:bg-primary/5">REGISTRAR TREINO</button>
<!-- Atmospheric Visual (Optional Decoration for Premium Feel) -->
<div class="h-32"></div>
</div>
</section>
</main>
<!-- Action Buttons -->
<footer class="p-md space-y-sm bg-background border-t border-surface-container mb-20">
<button class="w-full py-4 rounded-2xl bg-[#CCFF00] text-black font-bold text-label-lg active:scale-[0.98] transition-transform shadow-lg shadow-[#CCFF00]/20">
            INICIAR TREINO
        </button>
</footer>
<!-- Shared Bottom Nav Bar (Integrated) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] flex gap-2 bg-surface-container-high/90 backdrop-blur-md px-4 py-2 rounded-full shadow-lg z-50 items-center justify-between">
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors text-on-surface" href="#">
<div class="text-primary flex h-8 items-center justify-center" data-icon="Calendar" data-size="24px" data-weight="fill">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">calendar_month</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-[0.015em]">PLANO</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="Barbell" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-[0.015em]">TREINOS</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="ChartLine" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">show_chart</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-[0.015em]">PROGRESSO</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="ListChecks" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">checklist</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-[0.015em]">EXERCÍCIOS</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-on-surface-variant hover:text-on-surface transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="User" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-[0.015em]">PERFIL</p>
</a>
</div>
<script>
        // Simple interactive feedback for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                const originalScale = btn.style.transform;
                btn.style.transform = 'scale(0.96)';
                setTimeout(() => {
                    btn.style.transform = originalScale;
                }, 100);
            });
        });
    </script>
</body></html>
