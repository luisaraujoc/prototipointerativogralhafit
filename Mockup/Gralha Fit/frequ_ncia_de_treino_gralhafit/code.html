<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Frequência de Treino - GralhaFit</title>
<!-- Font Setup -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS Setup -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            gralha: {
              primary: '#034CD5',
              secondary: '#F4FBFF',
              tertiary: '#DFBA00',
              bg: '#000000', // Absolute dark mode as requested
              surface: '#111111',
              text: '#FFFFFF',
              textMuted: '#888888',
              border: '#333333'
            }
          },
          borderRadius: {
            'xl': '0.75rem', // Adjusting for "suaves"
            '2xl': '1rem',
            '3xl': '1.5rem',
            'full': '9999px',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    body {
      background-color: #000000;
      color: #FFFFFF;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Hide scrollbar for a cleaner mobile look */
    ::-webkit-scrollbar {
      display: none;
    }
    
    /* Progress bar segment styling */
    .progress-segment {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background-color: #333333;
      margin: 0 2px;
    }
    .progress-segment.active {
      background-color: #034CD5; /* Primary color */
    }
    
    /* Plus/Minus button styling */
    .ctrl-btn {
      width: 48px;
      height: 48px;
      border-radius: 1rem; /* Squircle approximation */
      background-color: #1A1A1A; /* Slightly lighter than pure black for contrast */
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .ctrl-btn:active {
      background-color: #333333;
    }
    
    /* Large number display */
    .number-display {
      font-size: 6rem;
      font-weight: 300;
      line-height: 1;
      text-align: center;
      width: 100px; /* Fixed width to prevent jumping when number changes */
    }
  </style>
</head>
<body class="h-screen w-full flex flex-col antialiased overflow-hidden selection:bg-gralha-primary selection:text-white">
<!-- BEGIN: Top Navigation & Progress -->
<header class="w-full px-4 pt-12 pb-6 flex flex-col gap-4">
<div class="flex items-center justify-between relative">
<!-- Back Button -->
<button aria-label="Voltar" class="w-10 h-10 rounded-full bg-[#1A1A1A] flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-gralha-primary">
<svg class="text-white" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<polyline points="15 18 9 12 15 6"></polyline>
</svg>
</button>
<!-- Step Indicator -->
<div class="absolute left-1/2 -translate-x-1/2 font-semibold text-sm tracking-widest text-white">
        13 / 18
      </div>
<!-- Placeholder for symmetry -->
<div class="w-10 h-10"></div>
</div>
<!-- Progress Bar -->
<div class="flex w-full px-2 mt-2">
<!-- Generated segments -->
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div> <!-- Current Step -->
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
</div>
</header>
<!-- END: Top Navigation & Progress -->
<!-- BEGIN: Main Content Area -->
<main class="flex-1 flex flex-col px-6 mt-6">
<!-- Title -->
<h1 class="text-3xl font-semibold text-white mb-12">
      Com que frequência você gostaria de treinar?
    </h1>
<!-- Selector Area -->
<div class="flex-1 flex flex-col items-center justify-center pb-20">
<!-- Controls -->
<div class="flex items-center justify-center gap-8 mb-4 w-full max-w-[300px]">
<!-- Minus Button -->
<button aria-label="Diminuir frequência" class="ctrl-btn">
<svg class="text-gralha-primary" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<line x1="5" x2="19" y1="12" y2="12"></line>
</svg>
</button>
<!-- Number Display -->
<div class="number-display text-white">
          5
        </div>
<!-- Plus Button -->
<button aria-label="Aumentar frequência" class="ctrl-btn">
<svg class="text-gralha-primary" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<line x1="12" x2="12" y1="5" y2="19"></line>
<line x1="5" x2="19" y1="12" y2="12"></line>
</svg>
</button>
</div>
<!-- Subtitle -->
<p class="text-gralha-textMuted text-lg font-medium">
        dias por semana
      </p>
</div>
</main>
<!-- END: Main Content Area -->
<!-- BEGIN: Footer CTA -->
<footer class="w-full px-6 pb-10 pt-4 bg-transparent">
<button class="w-full bg-gralha-primary text-white font-bold py-4 px-6 rounded-full text-center text-sm tracking-wider uppercase focus:outline-none focus:ring-4 focus:ring-blue-800 transition-transform active:scale-95 shadow-lg">
      PRÓXIMO
    </button>
</footer>
<!-- END: Footer CTA -->
</body></html>
