<!DOCTYPE html><html lang="pt-BR" style="width: 390px; height: 879px; overflow: hidden; position: relative;"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>GralhaFit - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              primary: '#034CD5',
              surface: '#222222',
              textMuted: '#9CA3AF',
              activeSegment: '#00E676',
              inactiveSegment: '#333333'
            }
          },
          borderRadius: {
            'squircle': '24px',
          }
        }
      }
    }
  </script>
<link data-snapdom="injected-import" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"></head>
<body class="antialiased h-screen flex flex-col items-center pt-12 pb-8 px-6 max-w-md mx-auto">
<!-- BEGIN: HeaderSection -->
<header class="w-full flex flex-col gap-6 mb-8">
<!-- Top Nav -->
<div class="flex items-center relative w-full">
<!-- Back Button -->
<button aria-label="Voltar" class="w-10 h-10 rounded-full bg-brand-primary flex items-center justify-center absolute left-0 active:scale-95 transition-transform">
<svg class="h-5 w-5 text-white" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</button>
<!-- Step Indicator -->
<div class="w-full text-center">
<span class="text-sm font-semibold tracking-wide">3 / 18</span>
</div>
</div>
<!-- Progress Bar -->
<div class="flex gap-1 w-full mt-2">
<div class="h-1 flex-1 rounded-full bg-brand-activeSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-activeSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-activeSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
<div class="h-1 flex-1 rounded-full bg-brand-inactiveSegment"></div>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: MainContent -->
<main class="w-full flex-1 flex flex-col gap-8">
<!-- Title -->
<h1 class="text-3xl font-medium leading-tight">
      Com que frequência você treina?
    </h1>
<!-- Selection Cards -->
<div class="flex flex-col gap-3 mt-auto mb-10">
<!-- Card 1 -->
<button class="w-full text-left bg-brand-surface rounded-squircle p-6 flex items-center justify-between active:bg-opacity-80 transition-colors">
<div class="flex flex-col gap-2 pr-4">
<h2 class="text-lg font-medium text-white">Regularmente</h2>
<p class="text-sm text-brand-textMuted leading-relaxed">
            Treino regularmente pelo menos 2 vezes por semana
          </p>
</div>
<svg class="h-5 w-5 text-gray-400 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" fill-rule="evenodd"></path>
</svg>
</button>
<!-- Card 2 -->
<button class="w-full text-left bg-brand-surface rounded-squircle p-6 flex items-center justify-between active:bg-opacity-80 transition-colors">
<div class="flex flex-col gap-2 pr-4">
<h2 class="text-lg font-medium text-white">Inconsistentemente</h2>
<p class="text-sm text-brand-textMuted leading-relaxed">
            Treino de forma irregular, algumas semanas sim e outras não
          </p>
</div>
<svg class="h-5 w-5 text-gray-400 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" fill-rule="evenodd"></path>
</svg>
</button>
<!-- Card 3 -->
<button class="w-full text-left bg-brand-surface rounded-squircle p-6 flex items-center justify-between active:bg-opacity-80 transition-colors">
<div class="flex flex-col gap-2 pr-4">
<h2 class="text-lg font-medium text-white">Nunca</h2>
<p class="text-sm text-brand-textMuted leading-relaxed">
            Nunca treinei ou estou há mais de 6 meses sem treinar
          </p>
</div>
<svg class="h-5 w-5 text-gray-400 shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" fill-rule="evenodd"></path>
</svg>
</button>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: HomeIndicatorArea -->
<div class="mt-auto w-full flex justify-center pb-2">
<div class="w-32 h-1 bg-gray-500 rounded-full opacity-50"></div>
</div>
<!-- END: HomeIndicatorArea -->
<div aria-hidden="true" data-snapdom-sandbox="true" id="snapdom-sandbox" style="position: absolute; left: -9999px; top: -9999px; width: 0px; height: 0px; overflow: hidden;"></div></body></html>
