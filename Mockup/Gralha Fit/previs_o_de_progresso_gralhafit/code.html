<!DOCTYPE html><html lang="pt-BR"><head></head><body class="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden font-sans bg-black text-white"><svg aria-hidden="true" class="inline-defs-container" style="position:absolute;width:0;height:0;overflow:hidden"></svg>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>GralhaFit - Progress Prediction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: '#0037a2',
            surface: {
              card: '#1a1c1c',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styles">
    body {
      background-color: #000000;
      color: #ffffff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    /* Graph gradient under the curve */
    .graph-gradient {
      background: linear-gradient(180deg, rgba(0, 55, 162, 0.2) 0%, rgba(0, 55, 162, 0) 100%);
    }

    /* SVG Curve Stroke */
    .graph-curve {
      stroke: #0037a2;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
    }

    /* Hide scrollbar for cleaner look if content overflows slightly */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
<!-- BEGIN: HeaderSection -->
<header class="px-6 pt-12 pb-4 flex flex-col gap-6 shrink-0 z-10 relative">
<!-- Top Row: Back Button & Step Counter -->
<div class="flex items-center justify-between">
<button aria-label="Go back" class="w-10 h-10 rounded-full bg-surface-card flex items-center justify-center hover:bg-gray-800 transition-colors">
<svg class="h-5 w-5 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
</button>
<span class="text-sm font-semibold tracking-wide text-gray-300">12 / 18</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Segmented Progress Bar -->
<div class="flex gap-1">
<!-- Completed Segments (12) -->
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<div class="h-1 flex-1 bg-primary rounded-full"></div>
<!-- Remaining Segments (6) -->
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
<div class="h-1 flex-1 bg-gray-800 rounded-full"></div>
</div>
</header>
<!-- END: HeaderSection -->
<!-- BEGIN: MainContent -->
<main class="flex-1 flex flex-col px-6 z-10 relative overflow-y-auto pb-32">
<!-- Headline -->
<div class="mt-8 mb-10 text-center">
<h1 class="text-2xl font-semibold leading-snug">
        Prevemos que você estará pesando <span class="text-primary">78 kg</span> até <span class="text-primary">04 de agosto</span>
</h1>
</div>
<!-- Graph Area -->
<div class="relative w-full h-64 mt-4 mb-6">
<!-- Tooltip -->
<div class="absolute right-[5%] top-0 -mt-10 flex flex-col items-center">
<div class="bg-primary text-white text-sm font-bold py-2 px-4 rounded-xl shadow-lg">
          78 KG
        </div>
<!-- Tooltip Arrow -->
<div class="w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-primary -mt-[1px]"></div>
</div>
<!-- Graph Visualization -->
<div class="w-full h-full relative">
<!-- SVG for Curve and Area -->
<svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
<defs>
<linearGradient id="grad1" x1="0%" x2="0%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#0037a2;stop-opacity:0.3"></stop>
<stop offset="100%" style="stop-color:#0037a2;stop-opacity:0"></stop>
</linearGradient>
</defs>
<!-- Area under curve -->
<path d="M10,60 C40,60 60,10 90,10 L90,100 L10,100 Z" fill="url(#grad1)"></path>
<!-- The Curve itself -->
<path class="graph-curve" d="M10,60 C40,60 60,10 90,10"></path>
<!-- Start Point Indicator -->
<circle cx="10" cy="60" fill="#0037a2" r="3"></circle>
<circle cx="10" cy="60" fill="none" opacity="0.5" r="5" stroke="#0037a2" stroke-width="1.5"></circle>
<!-- End Point Indicator -->
<circle cx="90" cy="10" fill="#0037a2" r="3"></circle>
<circle cx="90" cy="10" fill="none" opacity="0.5" r="5" stroke="#0037a2" stroke-width="1.5"></circle>
</svg>
<!-- Vertical Guide Lines (Subtle) -->
<div class="absolute left-[10%] top-0 bottom-0 border-l border-gray-800"></div>
<div class="absolute right-[10%] top-0 bottom-0 border-r border-gray-800"></div>
</div>
<!-- X-Axis Labels -->
<div class="absolute bottom-0 left-0 right-0 border-t border-gray-800 pt-3 flex justify-between text-sm text-gray-400">
<span class="pl-[8%]">Hoje</span>
<span class="pr-[6%]">04 de ago</span>
</div>
</div>
<!-- Informational Card -->
<div class="mt-auto mb-6 bg-surface-card rounded-2xl p-5 flex items-start gap-4">
<div class="text-2xl mt-1 shrink-0">
        🎯
      </div>
<p class="text-sm text-gray-300 leading-relaxed">
        Progresso sólido pela frente! Ganhar massa muscular magra aumenta a força, a postura e o metabolismo.
      </p>
</div>
</main>
<!-- END: MainContent -->
<!-- BEGIN: FooterAction -->
<footer class="absolute bottom-0 left-0 right-0 px-6 pb-10 pt-4 bg-gradient-to-t from-black via-black to-transparent z-20">
<button class="w-full bg-primary text-white font-bold py-4 rounded-full text-sm tracking-wider uppercase hover:bg-blue-800 transition-colors active:scale-[0.98]">
      PRÓXIMO
    </button>
</footer>
<!-- END: FooterAction -->
</body></html>
