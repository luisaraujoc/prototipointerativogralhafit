<!DOCTYPE html><html class="dark" lang="pt-BR"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>GralhaFit - Tempo de Treino</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: '#034CD5',
            surface: '#1C1C1E', // Apple dark mode surface color
            background: '#000000', // Pure black background
            muted: '#9CA3AF',
          },
          borderRadius: {
            'squircle': '1.5rem', // Approximation of squircle (24px)
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Utility for a more squircle-like appearance using clip-path could be added here if needed, but standard border-radius is more broadly supported and often sufficient for web representation of iOS styles */
    .squircle {
      border-radius: 24px; /* Slightly larger radius for a squircle feel */
    }
  </style>
</head>
<body class="bg-background text-white min-h-screen flex flex-col font-sans antialiased">
<!-- BEGIN: Header Section -->
<header class="px-6 pt-12 pb-6">
<div class="flex items-center justify-between mb-6 relative">
<!-- Back Button -->
<button aria-label="Voltar" class="w-10 h-10 bg-surface rounded-full flex items-center justify-center absolute left-0 z-10 transition-colors hover:bg-gray-800">
<svg class="text-white" fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="m15 18-6-6 6-6"></path>
</svg>
</button>
<!-- Step Indicator -->
<div class="flex-1 text-center font-medium text-sm tracking-wide">
        14 / 18
      </div>
</div>
<!-- Progress Bar -->
<div class="flex gap-1 mb-8">
<!-- Filled segments (14) -->
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<div class="h-1 bg-primary rounded-full flex-1"></div>
<!-- Empty segments (4) -->
<div class="h-1 bg-surface rounded-full flex-1"></div>
<div class="h-1 bg-surface rounded-full flex-1"></div>
<div class="h-1 bg-surface rounded-full flex-1"></div>
<div class="h-1 bg-surface rounded-full flex-1"></div>
</div>
</header>
<!-- END: Header Section -->
<!-- BEGIN: Main Content -->
<main class="px-6 flex-1 flex flex-col">
<!-- Title -->
<h1 class="text-3xl font-semibold mb-8 leading-tight">
      Qual é o tempo ideal de treino pra você?
    </h1>
<!-- Options List -->
<div class="flex flex-col gap-4">
<!-- Option 1: Rápido -->
<button class="bg-surface squircle p-6 flex items-center justify-between text-left w-full hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<div>
<h2 class="text-lg font-medium text-white mb-1">Rápido</h2>
<p class="text-sm text-muted">Até 20 minutos</p>
</div>
<svg class="text-muted" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="m9 18 6-6-6-6"></path>
</svg>
</button>
<!-- Option 2: Curto -->
<button class="bg-surface squircle p-6 flex items-center justify-between text-left w-full hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<div>
<h2 class="text-lg font-medium text-white mb-1">Curto</h2>
<p class="text-sm text-muted">De 20 a 40 minutos</p>
</div>
<svg class="text-muted" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="m9 18 6-6-6-6"></path>
</svg>
</button>
<!-- Option 3: Médio -->
<button class="bg-surface squircle p-6 flex items-center justify-between text-left w-full hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<div>
<h2 class="text-lg font-medium text-white mb-1">Médio</h2>
<p class="text-sm text-muted">De 40 a 60 minutos</p>
</div>
<svg class="text-muted" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="m9 18 6-6-6-6"></path>
</svg>
</button>
<!-- Option 4: Longo -->
<button class="bg-surface squircle p-6 flex items-center justify-between text-left w-full hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary">
<div>
<h2 class="text-lg font-medium text-white mb-1">Longo</h2>
<p class="text-sm text-muted">60+ minutos</p>
</div>
<svg class="text-muted" fill="none" height="16" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="m9 18 6-6-6-6"></path>
</svg>
</button>
</div>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Action / Safe Area -->
<div class="px-6 pb-8 pt-6 mt-auto">
<button class="w-full bg-primary text-white font-semibold py-4 rounded-[24px] text-lg hover:opacity-90 transition-opacity focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
    PRÓXIMO
  </button>
</div>
<div class="h-2"></div>
<!-- END: Bottom Action / Safe Area -->
</body></html>
