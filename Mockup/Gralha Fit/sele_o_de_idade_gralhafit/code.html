<script>
        // Simple JS to handle the scroll snapping visual effect (mock functionality)
        const picker = document.getElementById('agePicker');
        const items = picker.querySelectorAll('div');
        
        // Initial scroll position to center '24'
        // Rough calculation: 6 items before * 64px height = 384px
        picker.scrollTop = 384;
        
        picker.addEventListener('scroll', () => {
            const containerCenter = picker.getBoundingClientRect().top + picker.getBoundingClientRect().height / 2;
            
            items.forEach(item => {
                const itemCenter = item.getBoundingClientRect().top + item.getBoundingClientRect().height / 2;
                const distance = Math.abs(containerCenter - itemCenter);
                
                // Reset classes
                item.className = 'h-16 w-full flex items-center justify-center snap-center transition-all duration-200 text-white';
                
                if (distance < 32) { // Center item (64px height / 2)
                    item.classList.add('font-displayLarge', 'text-[56px]', 'leading-none', 'opacity-100', 'scale-110', 'font-bold');
                } else if (distance < 96) { // 1 item away
                    item.classList.add('font-titleLarge', 'text-titleLarge', 'opacity-50', 'scale-95');
                } else if (distance < 160) { // 2 items away
                    item.classList.add('font-titleLarge', 'text-titleLarge', 'opacity-30', 'scale-90');
                } else { // Further away
                    item.classList.add('font-titleLarge', 'text-titleLarge', 'opacity-20', 'scale-90');
                }
            });
        });
    </script>
