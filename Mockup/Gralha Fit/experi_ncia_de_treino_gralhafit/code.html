<!DOCTYPE html><html class="dark" lang="pt-BR"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>GralhaFit - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#eeeeee",
                        "inverse-on-surface": "#f0f1f1",
                        "on-secondary-fixed": "#161d20",
                        "on-surface": "#1a1c1c",
                        "secondary-fixed": "#dce4e7",
                        "background": "#000000", /* Apple Dark Mode Style - Updated to Pure Black */
                        "on-primary-container": "#c3cfff",
                        "inverse-primary": "#b5c4ff",
                        "tertiary-container": "#caa800",
                        "outline-variant": "#c3c5d7",
                        "secondary-container": "#dce4e7",
                        "surface-container-high": "#e8e8e8",
                        "secondary": "#585f63",
                        "inverse-surface": "#2f3131",
                        "on-tertiary-fixed": "#221b00",
                        "surface-tint": "#1452da",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#003cad",
                        "tertiary": "#DFBA00",
                        "on-surface-variant": "#434655",
                        "neutral": "#FCFCFC",
                        "on-secondary-fixed-variant": "#41484b",
                        "surface": "#1C1C1E", /* Apple Surface Card Style */
                        "surface-variant": "#e2e2e2",
                        "tertiary-fixed-dim": "#e9c316",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#034cd5",
                        "error-container": "#ffdad6",
                        "border": "#E4E4E4",
                        "on-secondary": "#ffffff",
                        "primary-fixed": "#dce1ff",
                        "outline": "#737686",
                        "on-background": "#FFFFFF",
                        "secondary-fixed-dim": "#c0c8cb",
                        "tertiary-fixed": "#ffe174",
                        "primary": "#0037a2",
                        "surface-bright": "#f9f9f9",
                        "on-primary-fixed": "#00164e",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "primary-fixed-dim": "#b5c4ff",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#5e6569",
                        "on-primary": "#ffffff",
                        "surface-dim": "#dadada",
                        "on-tertiary-fixed-variant": "#554500",
                        "surface-container-low": "#f3f3f3",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#4c3e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "24px", /* Modern Apple style roundness */
                        "xl": "32px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "lg": "24px",
                        "md": "16px",
                        "xl": "32px"
                    },
                    "fontFamily": {
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["1.75rem", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "title-lg": ["1.375rem", {"lineHeight": "1.4", "fontWeight": "500"}],
                        "body-lg": ["1rem", {"lineHeight": "1.5", "fontWeight": "500"}],
                        "body-md": ["0.875rem", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-sm": ["0.75rem", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-md": ["0.75rem", {"lineHeight": "1", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .squircle {
            /* Simulating corner smoothing for a premium iOS-like feel */
            mask-image: paint(squircle);
            --squircle-radius: 24px;
            --squircle-smooth: 0.6;
            border-radius: 24px;
        }

        .progress-bar-segment {
            height: 4px;
            flex-grow: 1;
            border-radius: 2px;
            margin-right: 4px;
        }
        .progress-bar-segment:last-child {
            margin-right: 0;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        .active-scale:active {
            transform: scale(0.97);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
<!-- Header Section -->
<header class="w-full flex items-center justify-between px-md py-lg relative">
<button class="w-10 h-10 rounded-full bg-primary flex items-center justify-center active-scale transition-colors hover:opacity-80">
<span class="material-symbols-outlined text-on-primary" data-icon="chevron_left">chevron_left</span>
</button>
<div class="absolute left-1/2 -translate-x-1/2">
<span class="font-label-md text-label-md text-on-surface-variant tracking-widest text-white">2 / 18</span>
</div>
<div class="w-10"></div> <!-- Spacer for perfect centering -->
</header>
<!-- Progress Bar -->
<div class="flex px-md mb-xl">
<!-- 2nd step, so 2 primary colors -->
<div class="progress-bar-segment bg-primary"></div>
<div class="progress-bar-segment bg-primary"></div>
<!-- Remaining 16 segments in muted surface color -->
<script>
            for (let i = 0; i < 16; i++) {
                document.write('<div class="progress-bar-segment bg-surface/30"></div>');
            }
        </script>
</div>
<!-- Main Content -->
<main class="flex-1 px-md">
<h1 class="font-headline-md text-headline-md text-on-background mb-xl pr-lg">
            Qual é a sua experiência com treino de força?
        </h1>
<!-- Selection List -->
<div class="flex flex-col gap-sm">
<!-- Card 1: Iniciante -->
<div class="bg-surface rounded-lg p-lg flex items-center justify-between active-scale cursor-pointer group hover:bg-on-surface-variant/10 transition-colors">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-background mb-1">Iniciante</span>
<span class="font-body-sm text-body-sm text-on-surface-variant/80">Menos de 1 ano</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-background transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Card 2: Intermediário -->
<div class="bg-surface rounded-lg p-lg flex items-center justify-between active-scale cursor-pointer group hover:bg-on-surface-variant/10 transition-colors">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-background mb-1">Intermediário</span>
<span class="font-body-sm text-body-sm text-on-surface-variant/80">1-2 anos</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-background transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Card 3: Avançado -->
<div class="bg-surface rounded-lg p-lg flex items-center justify-between active-scale cursor-pointer group hover:bg-on-surface-variant/10 transition-colors">
<div class="flex flex-col">
<span class="font-body-lg text-body-lg text-on-background mb-1">Avançado</span>
<span class="font-body-sm text-body-sm text-on-surface-variant/80">Mais de 2 anos</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-background transition-colors" data-icon="chevron_right">chevron_right</span>
</div>
</div>
</main>
<!-- Footer Decoration / Ambient Light -->
<div class="mt-auto pointer-events-none overflow-hidden relative h-32 w-full">
<div class="absolute bottom-[-100px] left-1/2 -translate-x-1/2 w-[140%] h-[200px] bg-primary/10 blur-[100px] rounded-full"></div>
</div>
<!-- Onboarding Navigation Suppressed - Only content focus -->
<script>
        // Micro-interactions for selections
        document.querySelectorAll('.bg-surface').forEach(card => {
            card.addEventListener('click', () => {
                // Remove visual selection from others
                document.querySelectorAll('.bg-surface').forEach(c => {
                    c.classList.remove('ring-2', 'ring-primary');
                    c.classList.add('bg-surface');
                });
                // Add selection to clicked
                card.classList.add('ring-2', 'ring-primary');
                
                // Simulate navigation or progression
                setTimeout(() => {
                    console.log('Progressing to step 3...');
                }, 300);
            });
        });
    </script>
</body></html>
