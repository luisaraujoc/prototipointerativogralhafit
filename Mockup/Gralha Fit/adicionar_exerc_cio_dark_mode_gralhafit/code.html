<span class="text-label-lg-mobile" id="selected-count">0 exercícios selecionados</span>
<button class="bg-primary px-4 py-1.5 rounded-full text-label-lg-mobile font-bold hover:brightness-110 active:scale-95 transition-all">
            Adicionar
        </button>
</div>
<script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const selectionBar = document.getElementById('selection-bar');
        const countText = document.getElementById('selected-count');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('input[type="checkbox"]:checked').length;
                if (checkedCount > 0) {
                    countText.textContent = `${checkedCount} ${checkedCount === 1 ? 'exercício selecionado' : 'exercícios selecionados'}`;
                    selectionBar.classList.remove('opacity-0', 'scale-90', 'translate-y-4', 'pointer-events-none');
                } else {
                    selectionBar.classList.add('opacity-0', 'scale-90', 'translate-y-4', 'pointer-events-none');
                }
            });
        });
    </script>
