<style>
        body {
            /* Forced dark mode for this specific onboarding screen per user request */
            background-color: #000000;
            color: #ffffff;
        }
        /* Progress bar styling */
        .progress-bar {
            height: 6px;
            display: flex;
            gap: 4px;
        }
        .progress-segment {
            flex: 1;
            background-color: #2C2C2E;
            border-radius: 2px;
        }
        .progress-segment.active {
            background-color: #034cd5; /* primary-container */
        }
        
        /* Option Card Styling */
        .option-card {
            background-color: #2C2C2E;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }
        .option-card:hover {
            background-color: #3C3C3E;
        }
        .option-card.selected {
            border: 2px solid #034cd5; /* primary-container */
            background-color: rgba(3, 76, 213, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-['Plus_Jakarta_Sans'] antialiased overflow-x-hidden selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="bg-[#000000] docked full-width top-0 z-50">
<div class="flex items-center justify-between px-md py-sm w-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-[#2C2C2E] text-[#ffffff] hover:opacity-80 transition-opacity duration-200">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<div class="font-title-md text-title-md text-[#ffffff] opacity-80">
                14 / 18
            </div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Bar -->
<div class="px-md pb-md">
<div class="progress-bar w-full">
<!-- 18 segments, 14 active -->
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment active"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
<div class="progress-segment"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-md pt-lg pb-32 max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="mb-lg">
<h1 class="font-headline-sm text-headline-sm text-[#ffffff] font-medium leading-tight tracking-tight">
                Qual é o tempo ideal de treino pra você?
            </h1>
</div>
<!-- Options List -->
<div class="flex flex-col gap-sm mt-md">
<!-- Option 1: Rápido -->
<button class="option-card flex items-center justify-between p-lg rounded-[24px] text-left w-full group" onclick="selectOption(this)">
<div class="flex flex-col gap-1">
<span class="font-title-md text-title-md text-[#ffffff] font-medium">Rápido</span>
<span class="font-body-sm text-body-sm text-[#a1a1aa]">Até 20 minutos</span>
</div>
<span class="material-symbols-outlined text-[#a1a1aa] group-hover:text-[#ffffff] transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 2: Curto -->
<button class="option-card flex items-center justify-between p-lg rounded-[24px] text-left w-full group" onclick="selectOption(this)">
<div class="flex flex-col gap-1">
<span class="font-title-md text-title-md text-[#ffffff] font-medium">Curto</span>
<span class="font-body-sm text-body-sm text-[#a1a1aa]">De 20 a 40 minutos</span>
</div>
<span class="material-symbols-outlined text-[#a1a1aa] group-hover:text-[#ffffff] transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 3: Médio -->
<button class="option-card flex items-center justify-between p-lg rounded-[24px] text-left w-full group" onclick="selectOption(this)">
<div class="flex flex-col gap-1">
<span class="font-title-md text-title-md text-[#ffffff] font-medium">Médio</span>
<span class="font-body-sm text-body-sm text-[#a1a1aa]">De 40 a 60 minutos</span>
</div>
<span class="material-symbols-outlined text-[#a1a1aa] group-hover:text-[#ffffff] transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 4: Longo -->
<button class="option-card flex items-center justify-between p-lg rounded-[24px] text-left w-full group" onclick="selectOption(this)">
<div class="flex flex-col gap-1">
<span class="font-title-md text-title-md text-[#ffffff] font-medium">Longo</span>
<span class="font-body-sm text-body-sm text-[#a1a1aa]">60+ minutos</span>
</div>
<span class="material-symbols-outlined text-[#a1a1aa] group-hover:text-[#ffffff] transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-md pb-safe bg-gradient-to-t from-[#000000] via-[#000000] to-transparent z-40">
<div class="max-w-md mx-auto w-full">
<button class="w-full bg-[#034cd5] text-[#ffffff] font-label-lg text-label-lg py-4 rounded-full flex items-center justify-center tracking-wide font-medium hover:opacity-90 active:scale-[0.98] transition-all duration-200">
                PRÓXIMO
            </button>
</div>
</div>
<!-- Interactive Script -->
<script>
        function selectOption(element) {
            // Remove selected class from all options
            const options = document.querySelectorAll('.option-card');
            options.forEach(opt => opt.classList.remove('selected'));
            
            // Add selected class to clicked option
            element.classList.add('selected');
        }
    </script>
</body></html>
