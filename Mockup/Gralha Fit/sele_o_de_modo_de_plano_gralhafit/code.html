<script>
        // Micro-interactions for radio selection
        const radioGroups = document.querySelectorAll('label');
        radioGroups.forEach(group => {
            group.addEventListener('click', function() {
                // Reset all
                radioGroups.forEach(g => {
                    const indicator = g.querySelector('.w-6.h-6');
                    if(indicator) {
                        indicator.classList.remove('border-white');
                        indicator.classList.add('border-white/30');
                        indicator.innerHTML = '';
                    }
                });
                
                // Set active
                const indicator = this.querySelector('.w-6.h-6');
                if(indicator) {
                    indicator.classList.add('border-white');
                    indicator.classList.remove('border-white/30');
                    indicator.innerHTML = '<div class="w-3 h-3 bg-white rounded-full"></div>';
                }
            });
        });
    </script>
