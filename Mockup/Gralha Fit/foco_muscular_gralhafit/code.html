<script>
        // Simple micro-interaction for selection state
        document.querySelectorAll('main button').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active state from all
                document.querySelectorAll('main button').forEach(btn => {
                    btn.classList.remove('ring-2', 'ring-[#2B68FF]');
                    btn.querySelector('span.material-symbols-outlined').classList.remove('text-[#2B68FF]');
                    btn.querySelector('span.material-symbols-outlined').classList.add('text-gray-400');
                });
                
                // Add active state to clicked
                this.classList.add('ring-2', 'ring-[#2B68FF]');
                this.querySelector('span.material-symbols-outlined').classList.remove('text-gray-400');
                this.querySelector('span.material-symbols-outlined').classList.add('text-[#2B68FF]');
            });
        });
