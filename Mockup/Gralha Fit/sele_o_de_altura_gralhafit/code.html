<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GralhaFit - Altura</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1452da",
                        "on-primary": "#ffffff",
                        "background": "#000000",
                        "on-background": "#ffffff",
                        "surface": "#121212",
                        "on-surface": "#ffffff",
                        "surface-variant": "#2a2a2a",
                        "on-surface-variant": "#a0a0a0",
                        "outline": "#4a4a4a",
                        "surface-container": "#1e1e1e",
                    },
                    "fontFamily": {
                        "sans": ["Plus Jakarta Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>
<style>
        .picker-fade {
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col text-on-background antialiased selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="bg-background fixed top-0 w-full z-50 flex flex-col">
<div class="flex items-center justify-between px-4 h-16 w-full max-w-screen-xl mx-auto">
<button aria-label="Voltar" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:opacity-80 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-background">arrow_back</span>
</button>
<h1 class="text-sm font-semibold text-on-background">9 de 18</h1>
<div class="w-10 h-10"></div> <!-- Spacer for balance -->
</div>
<!-- Progress Bar -->
<div class="w-full px-4 pb-4 flex gap-1 h-2 max-w-screen-xl mx-auto">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-28 pb-32 px-4 flex flex-col items-center justify-start max-w-screen-sm mx-auto w-full gap-6">
<!-- Headline -->
<h2 class="text-2xl font-bold text-on-background text-center w-full mt-4">Qual a sua altura?</h2>
<!-- Segmented Control -->
<div class="flex bg-surface-container p-1 rounded-lg w-full max-w-[240px] mt-2">
<button class="flex-1 py-2 text-center rounded-md bg-surface shadow-sm text-sm text-on-background transition-colors font-bold">
                CM
            </button>
<button class="flex-1 py-2 text-center rounded-md text-on-surface-variant text-sm hover:bg-surface-container transition-colors font-medium">
                FT
            </button>
</div>
<!-- Value Display -->
<div class="flex items-baseline justify-center gap-2 mt-8 mb-4">
<span class="text-5xl font-bold text-on-background tracking-tight">182</span>
<span class="text-xl font-medium text-on-surface-variant">cm</span>
</div>
<!-- Picker Wheel Simulator -->
<div class="relative w-full max-w-[320px] h-[240px] flex justify-center items-center picker-fade select-none overflow-hidden mt-4">
<!-- Selection Highlight Background -->
<div class="absolute inset-y-0 w-full h-14 bg-surface-container my-auto rounded-xl -z-10 opacity-60"></div>
<!-- Left Picker (Integers) -->
<div class="flex-1 h-full flex flex-col items-center justify-center space-y-4 pt-12 pb-12 cursor-ns-resize" style="transform: translateY(0px);">
<div class="text-xl font-medium text-on-surface-variant opacity-30">179</div>
<div class="text-xl font-medium text-on-surface-variant opacity-50">180</div>
<div class="text-xl font-medium text-on-surface-variant opacity-70">181</div>
<div class="text-2xl text-on-background font-bold h-14 flex items-center">182</div>
<div class="text-xl font-medium text-on-surface-variant opacity-70">183</div>
<div class="text-xl font-medium text-on-surface-variant opacity-50">184</div>
<div class="text-xl font-medium text-on-surface-variant opacity-30">185</div>
</div>
<!-- Separator -->
<div class="w-8 flex justify-center items-center h-14">
<span class="text-2xl font-bold text-on-background">,</span>
</div>
<!-- Right Picker (Decimals) -->
<div class="flex-1 h-full flex flex-col items-center justify-center space-y-4 pt-12 pb-12 cursor-ns-resize" style="transform: translateY(0px);">
<div class="text-xl font-medium text-on-surface-variant opacity-30">7</div>
<div class="text-xl font-medium text-on-surface-variant opacity-50">8</div>
<div class="text-xl font-medium text-on-surface-variant opacity-70">9</div>
<div class="text-2xl text-on-background font-bold h-14 flex items-center">0</div>
<div class="text-xl font-medium text-on-surface-variant opacity-70">1</div>
<div class="text-xl font-medium text-on-surface-variant opacity-50">2</div>
<div class="text-xl font-medium text-on-surface-variant opacity-30">3</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex flex-col items-center px-4 pb-8 bg-background">
<button class="flex flex-row items-center justify-center gap-2 bg-primary text-on-primary rounded-full w-full py-4 hover:brightness-110 active:scale-[0.98] transition-all duration-200 shadow-sm max-w-screen-sm mx-auto">
<span class="text-sm uppercase font-bold tracking-wider">PRÓXIMO</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</nav>
</body></html>
