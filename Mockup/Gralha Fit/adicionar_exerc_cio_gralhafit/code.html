<!-- Floating Action Feedback -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full flex items-center gap-4 opacity-0 scale-90 translate-y-4 transition-all duration-300 pointer-events-none shadow-[0_4px_20px_rgba(255,255,255,0.2)]" id="selection-bar">
<span class="text-label-lg-mobile font-semibold whitespace-nowrap" id="selected-count">0 selecionados</span>
<button class="bg-black px-5 py-2 rounded-full text-label-lg-mobile font-bold text-white hover:bg-black/80 active:scale-95 transition-all">
            Adicionar
        </button>
</div>
<script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const selectionBar = document.getElementById('selection-bar');
        const countText = document.getElementById('selected-count');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const checkedCount = document.querySelectorAll('input[type="checkbox"]:checked').length;
                if (checkedCount > 0) {
                    countText.textContent = `${checkedCount} ${checkedCount === 1 ? 'selecionado' : 'selecionados'}`;
                    selectionBar.classList.remove('opacity-0', 'scale-90', 'translate-y-4', 'pointer-events-none');
                } else {
                    selectionBar.classList.add('opacity-0', 'scale-90', 'translate-y-4', 'pointer-events-none');
                }
            });
        });
    </script>
